name: Auto PR Promotion

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Create Promotion PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (startsWith(github.event.workflow_run.head_branch, 'feature/') ||
       github.event.workflow_run.head_branch == 'develop')
    runs-on: ubuntu-latest

    steps:
      - name: Create or reuse promotion PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const target = branch.startsWith('feature/') ? 'develop' : 'main';

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: target,
              head: `${owner}:${branch}`,
              per_page: 100
            });

            if (prs.length > 0) {
              core.info(`Open PR already exists: #${prs[0].number}`);
              return;
            }

            const title = branch.startsWith('feature/')
              ? `Promote ${branch} into develop`
              : 'Promote develop into main';

            const body = [
              'This PR was opened automatically after CI passed on a push.',
              '',
              `- Source branch: \`${branch}\``,
              `- Target branch: \`${target}\``,
              '',
              'Please review and merge when ready.'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: target,
              body
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);

  tag-main:
    name: Tag Main on CI Success
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Create tag for main commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.workflow_run.head_sha;

            const runCreatedAt = new Date(context.payload.workflow_run.created_at);
            const y = runCreatedAt.getUTCFullYear();
            const m = String(runCreatedAt.getUTCMonth() + 1).padStart(2, '0');
            const d = String(runCreatedAt.getUTCDate()).padStart(2, '0');
            const hh = String(runCreatedAt.getUTCHours()).padStart(2, '0');
            const mm = String(runCreatedAt.getUTCMinutes()).padStart(2, '0');
            const ss = String(runCreatedAt.getUTCSeconds()).padStart(2, '0');
            const tag = `main-${y}${m}${d}-${hh}${mm}${ss}`;

            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `tags/${tag}`
            });

            if (refs.length > 0) {
              core.info(`Tag ${tag} already exists`);
              return;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha
            });

            core.info(`Created tag ${tag} for commit ${sha}`);
