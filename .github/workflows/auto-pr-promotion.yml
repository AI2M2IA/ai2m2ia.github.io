name: Auto PR Promotion

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: auto-pr-promotion-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: Create Promotion PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (startsWith(github.event.workflow_run.head_branch, 'feature/') ||
       github.event.workflow_run.head_branch == 'develop')
    runs-on: ubuntu-latest

    steps:
      - name: Validate bot token
        env:
          BOT_GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
        if: ${{ env.BOT_GH_TOKEN == '' }}
        run: |
          echo "Missing BOT_GH_TOKEN secret. Configure a PAT/GitHub App token with pull request write permissions."
          exit 1

      - name: Validate bot token scope
        env:
          BOT_GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
        run: |
          echo "Validating BOT_GH_TOKEN permissions..."
          
          # Test token with a simple API call and check response headers
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: token $BOT_GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: BOT_GH_TOKEN is invalid or expired (HTTP $HTTP_CODE)"
            exit 1
          fi
          
          # For fine-grained PATs, verify repository access
          REPO_CHECK=$(curl -s -H "Authorization: token $BOT_GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.permissions.push // false')
          
          if [ "$REPO_CHECK" != "true" ]; then
            echo "ERROR: BOT_GH_TOKEN does not have write access to this repository"
            echo "Ensure the token has 'pull-requests: write' permission for this repo"
            exit 1
          fi
          
          echo "BOT_GH_TOKEN validation passed"

      - name: Create or reuse promotion PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.BOT_GH_TOKEN }}
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const target = branch.startsWith('feature/') ? 'develop' : 'main';

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: target,
              head: `${owner}:${branch}`,
              per_page: 100
            });

            if (prs.length > 0) {
              core.info(`Open PR already exists: #${prs[0].number}`);
              return;
            }

            const title = branch.startsWith('feature/')
              ? `Promote ${branch} into develop`
              : 'Promote develop into main';

            const body = [
              'This PR was opened automatically after CI passed on a push.',
              '',
              `- Source branch: \`${branch}\``,
              `- Target branch: \`${target}\``,
              '',
              'Please review and merge when ready.'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: target,
              body
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
