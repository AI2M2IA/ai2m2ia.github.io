name: Production Smoke

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prod-smoke:
    name: Prod smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        run: npm run test:prod

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Production smoke test failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `Production smoke tests failed on ${new Date().toISOString()}.

            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            **Commit:** ${context.sha}

            Please investigate immediately. The production site at https://ai2m2ia.github.io may be experiencing issues.

            <details>
            <summary>What to check</summary>

            - Download the Playwright report artifact from the workflow run
            - Run \`npm run test:prod\` locally to reproduce
            - Check https://ai2m2ia.github.io manually
            - Verify recent deployments didn't break critical functionality

            </details>`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-smoke-failure'
            });

            const existingIssue = issues.find(i => i.title.includes('Production smoke test failed'));

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Another failure occurred: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'production', 'production-smoke-failure']
              });
            }
