name: Auto Tag Main

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  tag-main:
    name: Tag Main on CI Success
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Create tag for main commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.workflow_run.head_sha;

            const runCreatedAt = new Date(context.payload.workflow_run.created_at);
            const y = runCreatedAt.getUTCFullYear();
            const m = String(runCreatedAt.getUTCMonth() + 1).padStart(2, '0');
            const d = String(runCreatedAt.getUTCDate()).padStart(2, '0');
            const hh = String(runCreatedAt.getUTCHours()).padStart(2, '0');
            const mm = String(runCreatedAt.getUTCMinutes()).padStart(2, '0');
            const ss = String(runCreatedAt.getUTCSeconds()).padStart(2, '0');
            const tag = `main-${y}${m}${d}-${hh}${mm}${ss}`;

            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `tags/${tag}`
            });

            if (refs.length > 0) {
              core.info(`Tag ${tag} already exists`);
              return;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha
            });

            core.info(`Created tag ${tag} for commit ${sha}`);
