name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Auto-review only on the release gate (develop -> main). On any other PR,
    # invoke on demand by commenting "@claude" in the PR thread or in a review.
    if: >
      github.event.pull_request.draft == false &&
      (
        (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Claude review
        uses: anthropics/claude-code-action@7f37f2e37370b88fc5bd16496c0512c6e8aa2e45
        with:
          # Auth via Claude Max subscription (not API tokens). Generate locally
          # with `claude setup-token`, store as CLAUDE_CODE_AUTH_TOKEN secret.
          # Note: the secret name diverges from Anthropic's convention
          # (CLAUDE_CODE_OAUTH_TOKEN) for cross-repo consistency in this org.
          # The action's input name (claude_code_oauth_token) is unchanged.
          # Token lifetime: ~1 year. Quota shares with local Claude Code usage.
          # If you ever set ANTHROPIC_API_KEY as well, the API key takes
          # precedence — leave it unset to keep using the subscription.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_AUTH_TOKEN }}
          prompt: |
            Review this pull request. Be concise and only flag concrete issues
            you can point at file:line. Do not restate the diff.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 4
            --append-system-prompt "You are an AppSec, accessibility, and test-quality reviewer for the AI(2)M(2)IA static site (GitHub Pages + PWA reader). Treat OWASP Top 10 2021, WCAG 2.1 AA, and missing/weak tests as priorities, in that order. The site is read-only with no auth or PII — do not flag findings that require auth/forms to exploit. Respect existing accepted-risk decisions in AGENTS.md §13 (clickjacking). Always reference file paths and line numbers from the diff. If you find nothing actionable, say so in one line."
